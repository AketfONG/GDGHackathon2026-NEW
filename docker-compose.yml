services:
  postgres:
    image: postgres:16-alpine
    container_name: gdg-study-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: study_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: gdg-study-agent-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: Impromptu
      MONGO_INITDB_ROOT_PASSWORD: Impromptu
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
